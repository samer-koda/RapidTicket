<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280" />
  <title>RapidTicket — Social Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1280px;
      height: 640px;
      overflow: hidden;
      background: #121212;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .canvas {
      position: relative;
      width: 1280px;
      height: 640px;
      background: #121212;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      overflow: hidden;
    }

    /* Decorative background glow */
    .glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255, 90, 31, 0.12) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* Top-right corner accent */
    .corner-accent {
      position: absolute;
      top: -80px;
      right: -80px;
      width: 280px;
      height: 280px;
      border: 2px solid rgba(255, 90, 31, 0.2);
      border-radius: 50%;
      pointer-events: none;
    }
    .corner-accent::before {
      content: '';
      position: absolute;
      top: 30px;
      left: 30px;
      right: 30px;
      bottom: 30px;
      border: 2px solid rgba(255, 90, 31, 0.12);
      border-radius: 50%;
    }

    /* Bottom-left corner accent */
    .corner-accent-bl {
      position: absolute;
      bottom: -100px;
      left: -100px;
      width: 320px;
      height: 320px;
      border: 2px solid rgba(255, 90, 31, 0.1);
      border-radius: 50%;
      pointer-events: none;
    }

    /* Horizontal rule */
    .rule {
      width: 64px;
      height: 3px;
      background: #FF5A1F;
      border-radius: 2px;
      margin: 28px 0 24px;
    }

    .logo {
      width: 340px;
      display: block;
    }

    .tagline {
      font-size: 36px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: -0.5px;
    }

    .description {
      margin-top: 12px;
      font-size: 18px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0;
    }

    .pills {
      display: flex;
      gap: 10px;
      margin-top: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .pill {
      padding: 7px 16px;
      border-radius: 100px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 14px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      background: rgba(255, 255, 255, 0.04);
      letter-spacing: 0.2px;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="glow"></div>
    <div class="corner-accent"></div>
    <div class="corner-accent-bl"></div>

    <img class="logo" src="logos/logo.png" alt="RapidTicket" />
    <div class="rule"></div>
    <p class="tagline">Speed at Every Table.</p>
    <p class="description">LAN-only point-of-sale for restaurants &amp; bars — no internet required.</p>
    <div class="pills">
      <span class="pill">Floor Plans</span>
      <span class="pill">Order Management</span>
      <span class="pill">Kitchen Display</span>
      <span class="pill">Payments &amp; Receipts</span>
      <span class="pill">Open Source</span>
    </div>
  </div>
</body>
</html>
